# Streamlit Secrets Template
# Copy this to .streamlit/secrets.toml and add your actual values
# This file is for reference only - actual secrets should be configured in Streamlit Cloud

[secrets]
# OpenAI Configuration (optional - for better LLM responses)
# OPENAI_API_KEY = "sk-your-openai-api-key-here"
# OPENAI_MODEL = "gpt-3.5-turbo"

# Performance Settings
MAX_CHUNKS = 100
ENABLE_CACHING = true

# Feature Flags
USE_OPENAI = false
USE_FALLBACK = true
DEBUG_MODE = false
